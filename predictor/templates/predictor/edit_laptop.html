{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Laptop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'predictor/style.css' %}">
</head>
<body>
    <div class="container py-5 d-flex justify-content-center">
        <div class="glass-card w-100" style="max-width: 500px;">
            <h2 class="title-gradient text-center mb-4">Edit Details</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label text-light">Condition</label>
                    <input type="text" name="condition" value="{{ laptop.condition }}" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-light">Age (Years)</label>
                    <input type="number" name="age" step="0.1" value="{{ laptop.age }}" class="form-control" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Update & Recalculate</button>
                    <a href="{% url 'index' %}" class="btn btn-outline-light btn-sm mt-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
