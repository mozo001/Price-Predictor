<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Inventory</title>
</head>
<body>
 <h1>Laptop Inventory</h1>
<ul>
    {% for laptop in laptops %}
        <li>Condition: {{ laptop.condition }} | Age: {{ laptop.age }} | Predicted: ${{ laptop.predicted_price }}</li>
    {% endfor %}
</ul>
</body>
</html>
